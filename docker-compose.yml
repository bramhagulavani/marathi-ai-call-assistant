version: "3.9"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: marathi-ai-call-assistant
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8000
    volumes:
      - ./data:/app/data
    restart: unless-stopped
